<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Sistema Solar 3D — Three.js</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:monospace; }
    #info {
      position:absolute; top:10px; left:10px; z-index:10;
      color:#0ff; font-size:13px; line-height:1.8;
      background:rgba(0,0,0,0.65); padding:10px 16px;
      border-radius:8px; pointer-events:none; border:1px solid #114;
    }
    #info b { color:#fff; font-size:14px; }
    #controls {
      position:absolute; bottom:14px; left:50%;
      transform:translateX(-50%);
      display:flex; gap:10px; z-index:10;
    }
    button {
      background:#0a0a2e; color:#0ff; border:1px solid #0ff;
      padding:8px 20px; border-radius:5px; cursor:pointer; font-size:13px;
    }
    button:hover { background:#0ff; color:#000; }
  </style>
</head>
<body>
<div id="info">
  <b>⭐ Sistema Solar 3D</b><br>
  🖱️ Arrastra → rotar &nbsp;|&nbsp; Scroll → zoom<br>
  Cuerpos: <span id="count">5</span> &nbsp;|&nbsp; t = <span id="timer">0.0</span>s
</div>
<div id="controls">
  <button onclick="addPlanet()">+ Planeta</button>
  <button onclick="resetSim()">Reset</button>
  <button onclick="togglePause()">Pausa</button>
  <button onclick="toggleTrail()">Estela</button>
</div>

<script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010510);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 20000);
camera.position.set(0, 280, 700);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0x112244, 2));
scene.add(new THREE.PointLight(0xfff4aa, 4, 3000));

// Estrellas
const sv = [];
for (let i=0;i<3000;i++) sv.push((Math.random()-.5)*8000,(Math.random()-.5)*8000,(Math.random()-.5)*8000);
const sg = new THREE.BufferGeometry();
sg.setAttribute('position', new THREE.Float32BufferAttribute(sv,3));
scene.add(new THREE.Points(sg, new THREE.PointsMaterial({color:0xffffff,size:1.8})));

// Sol
let G=6000, SUN_MASS=1e6;
const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(42,32,32), new THREE.MeshBasicMaterial({color:0xffdd22}));
scene.add(sunMesh);
scene.add(new THREE.Mesh(new THREE.SphereGeometry(56,32,32), new THREE.MeshBasicMaterial({color:0xff8800,transparent:true,opacity:0.11,side:THREE.BackSide})));

// Planetas
const bodies=[], COLORS=[0xaaaaaa,0xffaa44,0x4499ff,0xff4444,0xffcc88,0xaaddff,0x88ffcc,0xff88ff];
let colorIdx=0, paused=false, showTrail=true, TRAIL_LEN=180;

function makePlanet(r,theta,incl,size,color) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(size,24,24),
    new THREE.MeshPhongMaterial({color,shininess:80,emissive:color,emissiveIntensity:0.08})
  );
  scene.add(mesh);

  const x=r*Math.cos(theta)*Math.cos(incl), y=r*Math.sin(incl), z=r*Math.sin(theta)*Math.cos(incl);
  const vOrb=Math.sqrt(G*SUN_MASS/r);

  // Anillo de órbita
  const pts=[];
  for(let i=0;i<=128;i++){const a=(i/128)*Math.PI*2; pts.push(new THREE.Vector3(r*Math.cos(a)*Math.cos(incl),r*Math.sin(incl),r*Math.sin(a)*Math.cos(incl)));}
  const orbitLine=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), new THREE.LineBasicMaterial({color,transparent:true,opacity:0.2}));
  scene.add(orbitLine);

  // Trail
  const tp=new Float32Array(500*3), tg=new THREE.BufferGeometry();
  tg.setAttribute('position',new THREE.BufferAttribute(tp,3));
  tg.setDrawRange(0,0);
  const trailLine=new THREE.Line(tg,new THREE.LineBasicMaterial({color,transparent:true,opacity:0.55}));
  scene.add(trailLine);

  const body={mesh,orbitLine,trailLine,pos:new THREE.Vector3(x,y,z),vel:new THREE.Vector3(-Math.sin(theta)*vOrb,0,Math.cos(theta)*vOrb),trail:[],color};
  mesh.position.copy(body.pos);
  bodies.push(body); colorIdx++;
  document.getElementById('count').textContent=bodies.length+1;
}

function createInitial(){
  makePlanet(130,0,0,8,0xaaaaaa);
  makePlanet(190,1.2,0.06,12,0xffaa44);
  makePlanet(265,2.5,0,13,0x4499ff);
  makePlanet(355,4.1,-0.03,10,0xff4444);
}
createInitial();

// Física
const _acc=new THREE.Vector3();
function stepPhysics(){
  bodies.forEach(b=>{
    _acc.set(-b.pos.x,-b.pos.y,-b.pos.z);
    const dist=Math.max(_acc.length(),5);
    _acc.normalize().multiplyScalar(G*SUN_MASS/(dist*dist));
    b.vel.addScaledVector(_acc,0.016);
    b.pos.addScaledVector(b.vel,0.016);
    b.mesh.position.copy(b.pos);
    if(showTrail){
      b.trail.push(b.pos.clone());
      if(b.trail.length>TRAIL_LEN)b.trail.shift();
      const arr=b.trailLine.geometry.attributes.position.array;
      for(let i=0;i<b.trail.length;i++){arr[i*3]=b.trail[i].x;arr[i*3+1]=b.trail[i].y;arr[i*3+2]=b.trail[i].z;}
      b.trailLine.geometry.setDrawRange(0,b.trail.length);
      b.trailLine.geometry.attributes.position.needsUpdate=true;
    }
  });
  sunMesh.rotation.y+=0.004;
}

// Cámara
let isDrag=false,px0=0,py0=0,camTheta=0.4,camPhi=0.38,camR=780;
renderer.domElement.addEventListener('mousedown',e=>{isDrag=true;px0=e.clientX;py0=e.clientY;});
window.addEventListener('mouseup',()=>isDrag=false);
window.addEventListener('mousemove',e=>{
  if(!isDrag)return;
  camTheta-=(e.clientX-px0)*0.006; camPhi+=(e.clientY-py0)*0.006;
  camPhi=Math.max(-1.3,Math.min(1.3,camPhi)); px0=e.clientX;py0=e.clientY;
});
window.addEventListener('wheel',e=>{camR=Math.max(150,Math.min(3000,camR+e.deltaY*0.7));},{passive:true});

// Loop
let elapsed=0,lastTime=performance.now();
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now(), dt=Math.min((now-lastTime)/1000,0.05); lastTime=now;
  if(!paused){stepPhysics();elapsed+=dt;}
  document.getElementById('timer').textContent=elapsed.toFixed(1);
  camera.position.set(camR*Math.cos(camPhi)*Math.sin(camTheta),camR*Math.sin(camPhi),camR*Math.cos(camPhi)*Math.cos(camTheta));
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}
animate();

// Botones globales
window.addPlanet=()=>{
  const r=140+Math.random()*350,theta=Math.random()*Math.PI*2,incl=(Math.random()-.5)*0.4,size=6+Math.random()*14;
  makePlanet(r,theta,incl,size,COLORS[colorIdx%COLORS.length]);
};
window.resetSim=()=>{
  bodies.forEach(b=>{scene.remove(b.mesh);scene.remove(b.trailLine);scene.remove(b.orbitLine);});
  bodies.length=0;colorIdx=0;elapsed=0;createInitial();
};
window.togglePause=()=>{paused=!paused;};
window.toggleTrail=()=>{showTrail=!showTrail;bodies.forEach(b=>{b.trailLine.visible=showTrail;b.trail=[];});};

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
